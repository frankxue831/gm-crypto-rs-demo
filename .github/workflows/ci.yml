name: CI

on:
  push:
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@1.85
        with:
          components: clippy
      - run: cargo clippy --all-targets --all-features -- -D warnings
      - run: cargo test
      - run: cargo test --all-features
      - name: Run default-feature examples
        run: |
          for ex in sm3_hashing hmac_and_kdf sm2_sign_verify sm2_encrypt_decrypt sm2_key_encoding sm4_cbc_ctr; do
            echo "=== $ex ==="
            cargo run --quiet --example "$ex"
          done
      - name: Run feature-gated examples
        run: |
          cargo run --quiet --features sm4-aead --example sm4_aead
          cargo run --quiet --features sm4-aead --example sm4_ccm
          cargo run --quiet --features sm4-aead --example sm4_streaming
          cargo run --quiet --features sm2-key-exchange --example sm2_key_exchange
          cargo run --quiet --features sm4-xts --example sm4_xts
      - name: Check bilingual docs are in sync
        run: ./scripts/check-doc-sync.sh docs/using-gmcrypto-core.md docs/using-gmcrypto-core.zh-CN.md
      - name: Check README bilingual sync
        run: ./scripts/check-doc-sync.sh README.md README.zh-CN.md
